  - name: forfiles.exe
    mitre: "T1202"
  - name: pcalua.exe
    mitre: "T1202"

# ============================================================
# Known bad/suspicious ports (same as Linux)
# ============================================================
suspicious_network:
  known_bad_ports:
    - 4444
    - 5555
    - 1337
    - 31337
    - 6666
    - 6667
    - 9001
    - 9002
    - 8443
    - 1234
    - 12345
    - 54321

# Credential patterns (reuse from Linux rules - same patterns apply)
# The credential_patterns section from DefaultRules.yaml applies to Windows too

# ============================================================
# Dangerous Windows privileges
# ============================================================
dangerous_privileges:
  - SeDebugPrivilege
  - SeTcbPrivilege
  - SeBackupPrivilege
  - SeRestorePrivilege
  - SeTakeOwnershipPrivilege
  - SeLoadDriverPrivilege
  - SeImpersonatePrivilege
  - SeAssignPrimaryTokenPrivilege
  - SeCreateTokenPrivilege
  - SeMachineAccountPrivilege

# ============================================================
# RDP security settings
# ============================================================
rdp_security:
  nla_required: true
  min_encryption_level: 3
  critical_registry_keys:
    - path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server'
      value: 'fDenyTSConnections'
      expected: 1
    - path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'
      value: 'UserAuthentication'
      expected: 1
    - path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'
      value: 'SecurityLayer'
      expected: 2
