    mitre: "T1218.005"
  - name: regsvr32.exe
    mitre: "T1218.010"
  - name: rundll32.exe
    mitre: "T1218.011"
  - name: certutil.exe
    mitre: "T1105"
  - name: bitsadmin.exe
    mitre: "T1105"
  - name: msiexec.exe
    mitre: "T1218.007"
  - name: wmic.exe
    mitre: "T1047"
  - name: cmstp.exe
    mitre: "T1218.003"
  - name: installutil.exe
    mitre: "T1218.004"
  - name: regasm.exe
    mitre: "T1218.009"
  - name: regsvcs.exe
    mitre: "T1218.009"
  - name: msbuild.exe
    mitre: "T1127.001"
  - name: csc.exe
    mitre: "T1127"
  - name: verclsid.exe
    mitre: "T1218"
  - name: control.exe
    mitre: "T1218.002"
  - name: presentationhost.exe
    mitre: "T1218"
  - name: bash.exe
    mitre: "T1202"
  - name: wscript.exe
    mitre: "T1059.005"
  - name: cscript.exe
